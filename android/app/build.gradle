plugins {
    id "com.android.application"
    id "kotlin-android"
    // يجب أن يأتي بعد إضافتي Android و Kotlin
    id "dev.flutter.flutter-gradle-plugin"
}

// تحميل إعدادات التوقيع من key.properties إن وُجد
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.tintstore.app"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    defaultConfig {
        applicationId = "com.tintstore.app"
        // flutter_secure_storage 10 و Tabby SDK يتطلبان 23 على الأقل
        minSdkVersion = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        multiDexEnabled = true
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                keyAlias keystoreProperties["keyAlias"]
                keyPassword keystoreProperties["keyPassword"]
                storeFile keystoreProperties["storeFile"] ? file(keystoreProperties["storeFile"]) : null
                storePassword keystoreProperties["storePassword"]
            }
        }
    }

    buildTypes {
        release {
            // يوقّع بمفتاح الإصدار إن وُجد key.properties، وإلا يستخدم مفتاح debug للتجربة
            signingConfig keystorePropertiesFile.exists() ? signingConfigs.release : signingConfigs.debug
            // تعطيل تقليص R8 مؤقّتاً: أحد SDKات المكتبات ينقصه keep-rules فيفشل R8.
            // APK أكبر قليلاً لكنّه يُبنى ويعمل للتوزيع/التجربة. يُعاد تفعيله لاحقاً بقواعد keep صحيحة.
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}

flutter {
    source = "../.."
}
