name: tint_mobile
description: Tint Store Flutter mobile app connected only to the Node.js middleware.
publish_to: "none"
version: 1.0.0+1

environment:
  # نطاق موسّع ليعمل على Flutter القديم (FlutLab = Dart 3.8.1) والجديد معاً
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_bloc: ">=8.1.6 <10.0.0"
  go_router: ">=14.0.0 <18.0.0"
  shared_preferences: ^2.3.0
  flutter_secure_storage: ">=9.2.2 <11.0.0"
  tabby_flutter_inapp_sdk: ^1.11.0
  geolocator: ^14.0.3
  geocoding: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ">=4.0.0 <7.0.0"
  flutter_launcher_icons: ">=0.13.1 <0.15.0"
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/splash/

# أيقونة التطبيق — شغّل بعد توليد المنصات:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 23
  remove_alpha_ios: true
  adaptive_icon_background: "#111113"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

# شاشة البداية — شغّل بعد توليد المنصات:
#   dart run flutter_native_splash:create
flutter_native_splash:
  color: "#111113"
  image: "assets/splash/splash_logo.png"
  android_12:
    color: "#111113"
    image: "assets/splash/splash_logo.png"
  ios: true
  android: true
