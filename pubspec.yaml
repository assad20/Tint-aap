name: tint_mobile
description: Tint Store Flutter mobile app connected only to the Node.js middleware.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  flutter_bloc: ^9.1.1
  go_router: ^17.1.0
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0
  tabby_flutter_inapp_sdk: ^1.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/splash/

# أيقونة التطبيق — شغّل بعد توليد المنصات:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 23
  remove_alpha_ios: true
  adaptive_icon_background: "#111113"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

# شاشة البداية — شغّل بعد توليد المنصات:
#   dart run flutter_native_splash:create
flutter_native_splash:
  color: "#111113"
  image: "assets/splash/splash_logo.png"
  android_12:
    color: "#111113"
    image: "assets/splash/splash_logo.png"
  ios: true
  android: true
